services:
  atta:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - inputs:/app/inputs
      - storage:/app/storage
      - huggingface_cache:/root/.cache/huggingface
      - torch_cache:/root/.cache/torch
    restart: unless-stopped

volumes:
  inputs:
  storage:
  huggingface_cache:
  torch_cache:
